<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Stackly Marketplace</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/animations.css">
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 2rem 1.25rem;
    }
    .auth-bg {
      position: absolute;
      inset: -10%;
      background: radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.15), transparent 50%),
                  radial-gradient(circle at 20% 80%, rgba(138, 43, 226, 0.18), transparent 50%),
                  linear-gradient(135deg, rgba(8, 10, 21, 0.92), rgba(4, 5, 12, 0.96)), 
                  url('../assets/modules_bg.webp');
      background-size: cover;
      background-position: center;
      animation: bgPan 25s ease-in-out infinite alternate;
      z-index: 1;
    }
    @keyframes bgPan {
      0% { transform: scale(1.05) translate(-10px, -10px); }
      50% { transform: scale(1.1) translate(10px, 10px); }
      100% { transform: scale(1.05) translate(-10px, -10px); }
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      padding: 3rem 2.5rem;
      border-radius: var(--radius-lg);
      position: relative;
      z-index: 2;
    }
    .back-home-btn-card {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50px;
      color: var(--text-primary);
      font-family: var(--font-title);
      font-weight: 600;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all var(--transition-fast);
      box-sizing: border-box;
    }
    .back-home-btn-card:hover {
      background: var(--primary-gradient);
      border-color: transparent;
      color: #ffffff !important;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px var(--primary-glow);
    }
    .back-home-btn-card svg {
      width: 14px;
      height: 14px;
      transition: transform var(--transition-fast);
    }
    .back-home-btn-card:hover svg {
      transform: translateX(-3px);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .auth-footer-links {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .auth-footer-links a:hover {
      color: var(--secondary);
    }
    
    /* Role Selector Styles */
    .role-selector-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .role-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 0.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-normal);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .role-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--border-hover);
      color: var(--text-primary);
      transform: translateY(-2px);
    }
    .role-btn.active {
      background: var(--primary-gradient);
      border-color: transparent;
      color: #ffffff !important;
      box-shadow: 0 4px 15px var(--primary-glow);
    }
    .role-btn.active .role-icon {
      stroke: #ffffff;
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
    }
    .role-icon {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      transition: transform var(--transition-fast);
    }
    .role-btn:hover .role-icon {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <!-- Loader -->
  <stackly-loader></stackly-loader>

  <div class="auth-wrapper">
    <div class="auth-bg"></div>
    <div class="glass glass-card auth-card">
      <div class="auth-header">
        <a href="../index.html" class="auth-logo">
          <stackly-logo size="46"></stackly-logo>
          <span style="font-family: var(--font-title); font-size: 2rem; font-weight: 800; color:var(--text-primary);">Stack<span style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ly</span></span>
        </a>
        <h2 style="font-size: 1.5rem; font-family: var(--font-title); margin-top: 0.5rem;">Access Portal</h2>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Sign in to manage your marketplace nodes.</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Access Identity Role</label>
          <div class="role-selector-container">
            <button type="button" class="role-btn active" data-role="customer">
              <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <span>Customer</span>
            </button>
            <button type="button" class="role-btn" data-role="vendor">
              <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
              </svg>
              <span>Vendor</span>
            </button>
            <button type="button" class="role-btn" data-role="admin">
              <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <span>Admin</span>
            </button>
          </div>
          <input type="hidden" id="selectedRole" value="customer">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Security Decryption Key (Email)</label>
          <div class="input-wrapper">
            <input class="form-input" type="email" id="email" required placeholder="alex@stackly.com">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Verification Passcode (Password)</label>
          <div class="input-wrapper">
            <input class="form-input" type="password" id="password" required placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Unlock Access</button>
      </form>

      <div class="auth-footer-links" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 1.5rem;">
        <a href="../index.html" class="back-home-btn-card">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          Back to Home
        </a>
        <a href="register.html" style="font-weight: 600; color: var(--primary);">Create Account</a>
      </div>
    </div>
  </div>

  <script src="../js/mockData.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/dashboard.js"></script>
  <script>
    // Role selection interaction
    const roleBtns = document.querySelectorAll('.role-btn');
    const selectedRoleInput = document.getElementById('selectedRole');
    
    roleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        roleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRoleInput.value = btn.dataset.role;
      });
    });

    // Login Form Submit Handling
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role = selectedRoleInput.value;

      const result = StacklyAuth.login(email, password, role);

      if (result.success) {
        // Successful login, route to dashboard
        if (result.role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else if (result.role === 'vendor') {
          window.location.href = 'vendor-dashboard.html';
        } else {
          window.location.href = 'customer-dashboard.html';
        }
      } else {
        alert(result.message);
      }
    });
  </script>
</body>
</html>
