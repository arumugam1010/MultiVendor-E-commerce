<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Products - Stackly Marketplace</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/animations.css">
  <style>
    .products-section-with-bg {
      background: linear-gradient(180deg, rgba(238, 242, 247, 0.75) 0%, var(--bg-base) 100%), 
                  url('../assets/catalog_banner.webp') no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
      padding-top: 4rem;
      padding-bottom: 5rem;
      position: relative;
    }
    
    [data-theme="dark"] .products-section-with-bg {
      background: linear-gradient(180deg, rgba(7, 9, 19, 0.8) 0%, var(--bg-base) 100%), 
                  url('../assets/catalog_banner.webp') no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
    }

    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 50px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
    }

    .filter-tab:hover {
      color: var(--text-primary);
      border-color: var(--primary);
    }

    .filter-tab.active {
      color: #ffffff;
      border-color: var(--secondary);
      background: var(--primary-gradient);
      box-shadow: 0 3px 10px var(--primary-glow);
    }

    select.sort-select {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 0.6rem 2rem 0.6rem 1rem;
      color: var(--text-primary);
      cursor: pointer;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyIj48cGF0aCBkPSJNNiA5bDYgNiA2LTYiLz48L3N2Zz4=");
      background-repeat: no-repeat;
      background-position: right 0.75rem center;
      background-size: 1rem;
    }

    [data-theme="light"] select.sort-select {
      background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJibGFjayIgc3Ryb2tlLXdpZHRoPSIyIj48cGF0aCBkPSJNNiA5bDYgNiA2LTYiLz48L3N2Zz4=");
    }

    .search-input-col {
      width: 280px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .product-img-wrapper {
      position: relative;
      aspect-ratio: 1;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      overflow: hidden;
      background: var(--bg-surface-alt);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem; /* Reduced padding to make image larger */
    }

    .product-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      /* Contain view for compact product grid */
      transition: transform var(--transition-normal);
    }

    .product-card:hover .product-img {
      transform: scale(1.08);
    }

    .product-discount-badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 5;
    }

    .product-wishlist-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 5;
    }

    .product-details {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      gap: 0.75rem;
    }

    .product-category {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .product-name {
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.3;
      height: auto;
      overflow: visible;
      display: block;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.85rem;
      color: #fbbf24;
    }

    .product-rating span {
      color: var(--text-muted);
      margin-left: 0.25rem;
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 0.5rem;
    }

    .product-price {
      font-size: 1.25rem;
      font-weight: 700;
      font-family: var(--font-title);
    }

    .product-price del {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-left: 0.5rem;
    }
  </style>
</head>

<body>
  <stackly-loader></stackly-loader>
  <stackly-header></stackly-header>

  <main>
    <section class="browse-wrapper reveal-on-scroll products-section-with-bg">
      <div class="container">
        <div class="section-header fade-in">
          <span class="badge badge-primary banner-badge" style="margin-bottom: 1rem;">MARKETPLACE CATALOG</span>
          <h2 class="banner-title">Marketplace Catalog</h2>
          <p class="banner-desc">Explore high-tech hardware, garments, and future items sourced from verified vendors.</p>
        </div>

        <!-- Filter Controls -->
        <div class="filter-bar">
          <div class="filter-tabs" id="category-tabs-container">
            <div class="filter-tab active" onclick="filterCategory('all')">All Products</div>
            <!-- Populated via JavaScript -->
          </div>

          <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <!-- Live Search -->
            <div class="search-box search-input-col">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              <input type="text" id="catalog-search" placeholder="Filter by name..." oninput="filterCatalog()">
            </div>

            <!-- Sorting selector -->
            <div style="position: relative;">
              <select class="sort-select" id="catalog-sort" onchange="filterCatalog()">
                <option value="default">Default Sorting</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="rating-desc">Rating: High to Low</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Products Grid -->
        <div class="product-grid" id="products-catalog-container">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>
  </main>

  <stackly-footer></stackly-footer>

  <script src="../js/mockData.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/dashboard.js"></script>
  <script>
    let activeCategory = 'all';
    let activeVendor = '';

    function getVendorCompanyName() {
      if (typeof StacklyAuth === 'undefined') return '';
      const currentUser = StacklyAuth.getCurrentUser();
      if (currentUser && currentUser.role === 'vendor') {
        const matchedVendor = window.StacklyDB.getVendors().find(v => 
          v.name.toLowerCase().includes(currentUser.username.toLowerCase()) || 
          currentUser.username.toLowerCase().includes(v.name.toLowerCase()) ||
          v.name.split(' ')[0].toLowerCase() === currentUser.username.split(' ')[0].toLowerCase()
        ) || window.StacklyDB.getVendors()[0];
        return matchedVendor ? matchedVendor.name : '';
      }
      return '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      populateCategories();

      const currentUser = typeof StacklyAuth !== 'undefined' ? StacklyAuth.getCurrentUser() : null;
      const vendorName = getVendorCompanyName();

      if (currentUser && currentUser.role === 'vendor' && vendorName) {
        activeVendor = vendorName;
        // Dynamically update the banner title and subtitle for vendor view
        const bannerTitle = document.querySelector('.banner-title');
        const bannerDesc = document.querySelector('.banner-desc');
        if (bannerTitle) bannerTitle.innerText = "My Products Catalog";
        if (bannerDesc) bannerDesc.innerText = "Manage and view your deployed products inside the marketplace.";
      } else {
        // Check for query parameters (?category=electronics & ?vendor=Name)
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('category') || urlParams.get('id');
        const vendorParam = urlParams.get('vendor');

        if (vendorParam) {
          activeVendor = vendorParam;
        }

        if (categoryParam) {
          filterCategory(categoryParam);
          return;
        }
      }

      filterCatalog();
    });

    function populateCategories() {
      const db = window.StacklyDB;
      const container = document.getElementById('category-tabs-container');
      if (db && container) {
        const tabs = db.getCategories().map(cat => `
          <div class="filter-tab" data-cat="${cat.id}" onclick="filterCategory('${cat.id}')">${cat.name}</div>
        `).join('');
        container.innerHTML += tabs;
      }
    }

    function filterCategory(catId) {
      activeCategory = catId;
      document.querySelectorAll('.filter-tab').forEach(tab => {
        const dataCat = tab.getAttribute('data-cat') || 'all';
        tab.classList.toggle('active', dataCat === catId);
      });
      // Clear vendor filter when manually switching categories, unless current user is a vendor
      const vendorName = getVendorCompanyName();
      if (vendorName) {
        activeVendor = vendorName;
      } else {
        activeVendor = '';
      }
      filterCatalog();
    }

    function filterCatalog() {
      const db = window.StacklyDB;
      const container = document.getElementById('products-catalog-container');
      if (!db || !container) return;

      let products = db.getProducts();

      // Category filter
      if (activeCategory !== 'all') {
        products = products.filter(p => p.category === activeCategory);
      }

      // Vendor filter
      if (activeVendor) {
        products = products.filter(p => p.vendor.toLowerCase() === activeVendor.toLowerCase());
      }

      // Search query filter
      const query = document.getElementById('catalog-search').value.toLowerCase().trim();
      if (query) {
        products = products.filter(p => p.name.toLowerCase().includes(query));
      }

      // Sorting
      const sortVal = document.getElementById('catalog-sort').value;
      if (sortVal === 'price-asc') {
        products.sort((a, b) => {
          const priceA = a.price * (1 - a.discount / 100);
          const priceB = b.price * (1 - b.discount / 100);
          return priceA - priceB;
        });
      } else if (sortVal === 'price-desc') {
        products.sort((a, b) => {
          const priceA = a.price * (1 - a.discount / 100);
          const priceB = b.price * (1 - b.discount / 100);
          return priceB - priceA;
        });
      } else if (sortVal === 'rating-desc') {
        products.sort((a, b) => b.rating - a.rating);
      }

      // Render cards
      if (products.length === 0) {
        container.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 4rem 0; color: var(--text-secondary);">
            <h3>No products match your filter parameters.</h3>
            <p>Try searching for a different keyword or category.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = products.map(p => {
        const discountAmt = p.price * (1 - p.discount / 100);
        return `
          <div class="glass glass-card product-card">
            <div class="product-img-wrapper">
              ${p.discount > 0 ? `<div class="badge badge-danger product-discount-badge">-${p.discount}%</div>` : ''}
              <button class="btn-icon product-wishlist-btn" onclick="event.stopPropagation(); addToWishlistHandler('${p.id}')">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
              </button>
              <img class="product-img" src="${p.image}" alt="${p.name}">
            </div>
            <div class="product-details">
              <span class="product-category">${p.category}</span>
              <a href="404.html" class="product-name">${p.name}</a>
              <div class="product-rating">
                ${'★'.repeat(Math.floor(p.rating))}${'☆'.repeat(5 - Math.floor(p.rating))}
                <span>(${p.reviewsCount} reviews)</span>
              </div>
              <div class="product-footer">
                <div class="product-price">
                  $${p.discount > 0 ? discountAmt.toFixed(2) : p.price.toFixed(2)}
                  ${p.discount > 0 ? `<del>$${p.price.toFixed(2)}</del>` : ''}
                </div>
                <button class="btn btn-primary btn-icon" onclick="event.stopPropagation(); addToCartHandler('${p.id}')" style="width:36px; height:36px; border-radius:8px;">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function addToCartHandler(productId) {
      const p = window.StacklyDB.getProducts().find(item => item.id === productId);
      if (p) {
        window.StacklyDB.addToCart(p, 1);
        alert(`${p.name} added to cart!`);
      }
    }

    function addToWishlistHandler(productId) {
      const p = window.StacklyDB.getProducts().find(item => item.id === productId);
      if (p) {
        window.StacklyDB.addToWishlist(p);
        alert(`${p.name} added to wishlist!`);
      }
    }
  </script>
</body>

</html>
